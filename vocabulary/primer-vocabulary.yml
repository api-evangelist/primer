- term: AdvisedActionEnum
  type: enum
  description: "The Primer-recommended action to take based on the underlying decline\
    \ reason and advice code. This advised action is unified across all supported\
    \ processors and payment methods.\n\n- `RETRY_LATER`: The payment was likely declined\
    \ due to a temporary issue (e.g. Insufficient funds). The payment can be retried\
    \ immediately or at a later date. \n- `UPDATE_DATA`: The payment was likely declined\
    \ because critical data was missing or out-of-date. Please ensure you use the\
    \ most up-to-date payment information and customer details before retrying the\
    \ payment.\n- `DO_NOT_RETRY`: The payment was declined and should not be retried.\
    \ You can still charge this payment method for future orders or installments.\n\
    - `STOP_ALL_PAYMENTS`: The processor or payment method explicitly informs you\
    \ to stop making any payment requests with this payment method. Please use another\
    \ payment method to charge this customer.\n- `null`: Primer is unable to determine\
    \ a recommended action. \n"
  values:
  - RETRY_LATER
  - UPDATE_DATA
  - DO_NOT_RETRY
  - STOP_ALL_PAYMENTS
