- term: PaymentStatusTypeEnum
  type: enum
  description: "The status reason type for the payment, providing more information\
    \ on the error. \n`APPLICATION_ERROR` indicates something went wrong internally\
    \ within primer's system. \n`GATEWAY_REJECTED` indicates that request was rejected\
    \ on the third-party. \n`GATEWAY_TIMEOUT` indicates the timeout limit on the third\
    \ party request was exceeded. \n`ISSUER_DECLINED` indicates a legitimate decline\
    \ that is not due to a timeout.\n"
  values:
  - APPLICATION_ERROR
  - GATEWAY_REJECTED
  - GATEWAY_TIMEOUT
  - ISSUER_DECLINED
