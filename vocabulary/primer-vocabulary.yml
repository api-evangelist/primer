- term: PreAuthorizationRecommendationEnum
  type: enum
  description: 'Pre-authorization recommendation indicating the SCA exemption or risk
    assessment path taken. Only present when `preAuthorizationResult` is `THREE_DS_EXEMPTION`.


    Values:

    - `TRANSACTION_RISK_ANALYSIS`: Indicates that the fraud check deemed the transaction
    low risk and recommends applying a Transaction Risk Analysis (TRA) exemption to
    bypass Strong Customer Authentication (SCA) under PSD2, reducing friction for
    users.

    '
  values:
  - TRANSACTION_RISK_ANALYSIS
