    RecurringTransactionTypeEnum:
      title: RecurringTransactionTypeEnum
      enum:
        - FIRST_PAYMENT
        - ECOMMERCE
        - SUBSCRIPTION
        - UNSCHEDULED
      type: string
      description: An enumeration.

    RecurringPaymentTypeSchema:
      title: Recurring Payment Type
      allOf:
        - $ref: '#/components/schemas/RecurringTransactionTypeEnum'
      description: >-
        Payment types, primarily to be used for recurring payments. See the table
        below for all possible values.

        Note: if no field is set, we will return a blank value and make a best effort
        to calculate the downstream fields required for processing the payment.


        | paymentType | Use case |

        | --- | --- |

        | `FIRST_PAYMENT` | a customer-initiated payment which is the first in a series
        of recurring payments or subscription, or a card on file scenario.

        | `ECOMMERCE` | a customer-initiated payment using stored payment details
        where the cardholder is present.

        | `SUBSCRIPTION` | a merchant-initiated payment as part of a series of payments
        on a fixed schedule and a set amount.

        | `UNSCHEDULED` | a merchant-initiated payment using stored payment details
        with no fixed schedule or amount.

    AuthorizationTypeEnum:
      title: AuthorizationTypeEnum
      enum:
