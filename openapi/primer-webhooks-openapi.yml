openapi: 3.0.2
info:
  x-logo:
    url: https://apidocs.primer.io/docs/assets/images/primer-logo.svg
  title: Primer Webhooks
  version: '2.4'
servers:
  - url: https://api.sandbox.primer.io
  - url: https://api.primer.io
paths:
  /payment-status:
    post:
      tags:
        - Payment Webhooks
      summary: Payment Status Update
      description: |
        Primer notifies you with a `PAYMENT.STATUS` webhook when a payment's status
        has been updated. This is especially useful for asyncronous processor Connections,
        which do not respond with an upfront authorization.

        The webhook events will arrive in the order that the payment status changes,
        for example you should expect a status of `PENDING`, then `AUTHORIZED`, then
        `SETTLED` (depending on how your workflow is set up).

        The webhook body contains the full payment object.
      operationId: payment_status_webhook_event
      requestBody:
        content:
          application/json:
            schema:
              title: Request
              allOf:
                - $ref: '#/components/schemas/PaymentStatusWebhookPayload'
      parameters:
        - in: header
          name: X-Signature-Primary
          schema:
            type: string
          required: true
          description: >-
            An [HMAC signature](https://en.wikipedia.org/wiki/HMAC) generated using
            the webhook payload and a shared signing secret. This is then converted
            to a base64 encoded string.
        - in: header
          name: X-Signature-Secondary
          schema:
            type: string
          required: true
          description: >-
            A secondary signature that is added when you have rotated your secret
            within the past 24 hours.
      responses:
        '200':
          description: >-
            Return a 200 status to indicate that the data was received successfully

  /payment-refund:
    post:
      tags:
        - Payment Webhooks
      summary: Payment Refund
      description: |
        Primer notifies you with a `PAYMENT.REFUND` Webhook when a refund request has been fully processed by a payment processor and the refund has reached a final state.

        Check the transaction with the most recent `transactionType: "REFUND"` in the `transactions` array:
        - if `processorStatus` is `SETTLED`, the refund was successful and the funds have been returned to the customer
        - if `processorStatus` is `FAILED`, the refund was unsuccessful

        Learn more about [how Primer handles webhooks](/docs/api-reference/get-started/configure-webhooks).

      operationId: payment_refund_webhook_event
      requestBody:
        content:
          application/json:
            schema:
              title: Request
              allOf:
                - $ref: '#/components/schemas/PaymentRefundWebhookPayload'
      parameters:
        - in: header
          name: X-Signature-Primary
          schema:
            type: string
          required: true
          description: >-
            An [HMAC signature](https://en.wikipedia.org/wiki/HMAC) generated using
            the webhook payload and a shared signing secret. This is then converted
            to a base64 encoded string.
        - in: header
          name: X-Signature-Secondary
          schema:
            type: string
          required: true
          description: >-
            A secondary signature that is added when you have rotated your secret
            within the past 24 hours.
      responses:
        '200':
          description: >-
            Return a 200 status to indicate that the data was received successfully

  /dispute-opened:
    post:
      tags:
        - Dispute & Chargebacks Webhooks
      summary: Dispute Open
      description: |
        Primer notifies you with a `DISPUTE.OPENED` webhook on newly opened disputes or chargebacks. This notification is unified across all processors.

        Learn more about [how Primer handles webhooks](/docs/api-reference/get-started/configure-webhooks).

      operationId: dispute_open_webhook_event
      requestBody:
        content:
          application/json:
            schema:
              title: Request
              allOf:
                - $ref: '#/components/schemas/DisputeOpenWebhookPayload'
      parameters:
        - in: header
          name: X-Signature-Primary
          schema:
            type: string
          required: true
          description: >-
            An [HMAC signature](https://en.wikipedia.org/wiki/HMAC) generated using
            the webhook payload and a shared signing secret. This is then converted
            to a base64 encoded string.
        - in: header
          name: X-Signature-Secondary
          schema:
            type: string
          required: true
          description: >-
            A secondary signature that is added when you have rotated your secret
            within the past 24 hours.
      responses:
        '200':
          description: >-
            Return a 200 status to indicate that the data was received successfully

  /dispute-status:
    post:
      tags:
        - Dispute & Chargebacks Webhooks
      summary: Dispute Status
      description: |
        Primer notifies you with a `DISPUTE.STATUS` webhook that will provide information on retrievals, disputes (also known as chargebacks), and preabritration filings.

        This notification is supported for processors Adyen, Braintree, Checkout.com & PayPal.

        The `DISPUTE.STATUS` event can be used to proactively communicate with customers, issue refunds, send disputes to risk tools, or to proactively defend disputes.

        The `DISPUTE.STATUS` event is currently in an open beta stage, as we continue to add more processors.

        Learn more about [managing disputes at Primer](/docs/disputes/manage-disputes).

      operationId: dispute_status_webhook_event
      requestBody:
        content:
          application/json:
            schema:
              title: Request
              allOf:
                - $ref: '#/components/schemas/DisputeStatusWebhookPayload'
      parameters:
        - in: header
          name: X-Signature-Primary
          schema:
            type: string
          required: true
          description: >-
            An [HMAC signature](https://en.wikipedia.org/wiki/HMAC) generated using
            the webhook payload and a shared signing secret. This is then converted
            to a base64 encoded string.
        - in: header
          name: X-Signature-Secondary
          schema:
            type: string
          required: true
          description: >-
            A secondary signature that is added when you have rotated your secret
            within the past 24 hours.
      responses:
        '200':
          description: >-
            Return a 200 status to indicate that the data was received successfully

