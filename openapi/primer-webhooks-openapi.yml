    PaymentStatusWebhookPayload:
      title: PaymentStatusWebhookPayload
      type: object
      properties:
        eventType:
          title: Event Type
          type: string
          description: >-
            The type of the webhook raised. `PAYMENT.STATUS` in this case.
        date:
          title: Date
          type: string
          description: The date-time that the webhook was sent.
          format: date-time
        notificationConfig:
          title: Notification Config
          type: object
          description: The notification configuration details.
          properties:
            id:
              title: ID
              type: string
              description: The notification configuration ID.
              format: uuid
            description:
              title: Description
              type: string
              description: The notification configuration description.
        version:
          title: Version
          type: string
          description: The payload version
          example: '2.4'
        payment:
          title: Payment Details
          type: object
          properties:
            id:
              title: Payment identifier
              type: string
              description: |
                The unique payment ID.

                You can use this ID to retrieve the payment details, or perform downstream operations.
            date:
              title: Payment date
              type: string
              description: >-
                The date and time at which the payment was created in UTC format.
              format: date-time
            dateUpdated:
              title: Date Updated
              type: string
              description: >-
                The date-time that the update related to the webhook has happened.
              format: date-time
            status:
              title: Current status
              allOf:
                - $ref: '#/components/schemas/PaymentStatus'
              description: >-
                See the payment [status table](../docs#payment-status) for more information.
            orderId:
              title: Order ID
              type: string
              description: Your reference for the payment.
            currencyCode:
              title: Currency
              type: string
              description: |
                The 3-letter currency code in [ISO 4217 format](https://en.wikipedia.org/wiki/ISO_4217#Active_codes).
                e.g. use `USD` for US dollars.
            amount:
              title: Payment amount
              minimum: 0.0
              type: integer
              format: int64
              description: The amount you charged the customer, in minor units.
            customerId:
              title: The ID of the customer using the checkout
              type: string
              description: The unique identifier for your customer.
            metadata:
              title: Payment Metadata
              type: object
              description: |
