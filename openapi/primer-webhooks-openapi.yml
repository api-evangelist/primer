    DisputeOpenWebhookPayload:
      title: DisputeOpenWebhookPayload
      type: object
      properties:
        eventType:
          title: Event Type
          type: string
          description: >-
            The type of the webhook raised. `DISPUTE.OPENED` in this case.
        processorId:
          title: Processor ID
          type: string
          description: The name of the processor that generated the dispute.
        processorDisputeId:
          title: Processor Dispute ID
          type: string
          description: >-
            A unique identifier for the corresponding connection dispute.
        paymentId:
          title: Payment ID
          type: string
          description: >-
            A unique identifier for the Primer payment corresponding to this dispute.
        transactionId:
          title: Transaction ID
          type: string
          description: >-
            A unique identifier for the Primer transaction corresponding to this dispute.
        orderId:
          title: Order ID
          type: string
          description: >-
            Your reference for the sale transaction that the dispute relates to.
        primerAccountId:
          title: Primer Account ID
          type: string
          description: A unique identifier for your Primer merchant account.

    DisputeStatusWebhookPayload:
      title: DisputeStatusWebhookPayload
      type: object
      properties:
        eventType:
          title: Event Type
          type: string
          description: |
            The type of event that triggered the webhook. This will have the value `DISPUTE.STATUS`. This indicates that a dispute notification was issued through a configured connection.

            Use these notifications to proactively communicate with your customer, issue refunds, or submit evidence to challenge disputes.
        version:
          title: Version
          type: string
          description: The payload version
          example: '2.4'
        type:
          title: Type
          type: string
          enum:
            - RETRIEVAL
            - DISPUTE
            - PREARBITRATION
          description: |
            The type of dispute event. More information on what the `type` field represents can be found in [Manage disputes](/docs/disputes/manage-disputes)
        status:
          title: Status
          type: string
          enum:
            - OPEN
            - ACCEPTED
            - CHALLENGED
            - EXPIRED
            - CANCELLED
            - WON
            - LOST
          description: |
            To see which statuses are applicable for a dispute `type`, and how we map `status`, please see [Manage disputes](/docs/disputes/manage-disputes).
        primerAccountId:
          title: Primer Account ID
          type: string
          description: A unique identifier for your Primer merchant account.
        transactionId:
          title: Transaction ID
          type: string
          description: >-
            A unique identifier for the Primer transaction corresponding to this dispute.
        orderId:
          title: Order ID
          type: string
          description: >-
            Your reference for the sale transaction that the dispute relates to.
        paymentId:
          title: Payment ID
          type: string
          description: >-
            A unique identifier for the Primer payment corresponding to this dispute.
        paymentMethod:
          title: Payment Method Information
          description: >-
            The payment method information for the payment that is now disputed.
          type: object
          properties:
            paymentMethodType:
              $ref: '#/components/schemas/PaymentMethodTypeEnum'
            paymentMethodData:
              title: Payment method data
              type: object
              properties:
                network:
                  $ref: '#/components/schemas/CardNetworkEnum'
        processor:
          title: Processor
          type: string
          enum:
            - ADYEN
            - BRAINTREE
          description: >-
            The payment processor that you submitted a payment to, and received a
            dispute notification from.
        processorDisputeId:
          title: Processor Dispute ID
          type: string
          description: |
            An identifier for this dispute provided by the processor. This is shared across multiple dispute `type` and `status` relating to the same payment.

            e.g. as an `open` dispute that is later challenged will share a `proccessorDisputeId`.
        receivedAt:
          title: Received date
          type: string
          format: date-time
          description: >-
            Date and time at which Primer received the processor's dispute event.
            Provided as an ISO timestamp in UTC.
        challengeRequiredBy:
          title: Challenge Required date
          type: string
          format: date-time
          description: >-
            Time by which the merchant must challenge a dispute. This is provided
            by the processor, where available.
        reason:
          title: Reason
          type: string
          description: >-
            Primer’s unified reason that explains why the dispute was raised. This
            should not vary across processors for the same dispute `reasonCode`, unlike
            the `processorReason`.
        reasonCode:
          title: Reason Code
          type: string
          description: >-
            The dispute reason code for a dispute. This will be the same code provided
            by the card schemes.
        processorReason:
          title: Processor Reason
          type: string
          description: >-
            The dispute reason provided by the processor. This can vary across processors
            for the same dispute `reasonCode`, which is why we provide a unified field
            - `reason`.
        amount:
          title: Amount
          type: integer
          format: int64
          description: |
            The disputed amount. Note: this is not always the same as the payment amount.

            This will be displayed in minor units.

            e.g. for $7, use `700`. Some currencies, such as Japanese Yen, do not have minor units. In this case you should use the value as it is, without any formatting. For example for ¥100, use `100`.
        currency:
          title: Currency
          type: string
          description: >
            The 3-letter currency code in [ISO 4217 format](https://en.wikipedia.org/wiki/ISO_4217#Active_codes).
            e.g. use `USD` for US dollars.
        merchantId:
          title: Merchant ID
          type: string
          description: >-
            The merchant ID registered at the payment processor used for this dispute.

    PaymentCardTokenAPISchema:
      title: PaymentCardTokenAPISchema
      required:
        - last4Digits
        - expirationMonth
        - expirationYear
      type: object
      properties:
        first6Digits:
          title: Payment card's first six digits
          maxLength: 6
          minLength: 6
          type: string
        last4Digits:
          title: Payment card's last four digits
          maxLength: 4
          minLength: 4
          type: string
        expirationMonth:
          title: Expiration month
          maxLength: 2
          minLength: 2
          type: string
        expirationYear:
          title: Expiration year
          maxLength: 4
          minLength: 4
          type: string
        cardholderName:
          title: Cardholder's name
          type: string
        network:
          title: Card network
          type: string
        isNetworkTokenized:
          title: Is represented by a digital PAN
          type: boolean
          default: false
        binData:
          $ref: '#/components/schemas/BinDataAPISchema'

    StatusReasonAPISchema:
      title: StatusReasonAPISchema
      required:
        - type
      type: object
      properties:
        type:
          title: Payment status type
          allOf:
            - $ref: '#/components/schemas/PaymentStatusTypeEnum'
          description: |
            The status reason type for the payment, providing more information on the error.
            `APPLICATION_ERROR` indicates something went wrong internally within primer's system. 
            `GATEWAY_REJECTED` indicates that request was rejected on the third-party.
            `GATEWAY_TIMEOUT` indicates the timeout limit on the third party request was exceeded. 
            `ISSUER_DECLINED` indicates a legitimate decline that is not due to a timeout.
        declineType:
          title: Decline Type
          allOf:
            - $ref: '#/components/schemas/DeclineTypeEnum'
          description: |
            If the error is of type `ISSUER_DECLINED` this will be returned.

            Declines of type `SOFT_DECLINE` may be retried,
            whereas declines of type `HARD_DECLINE` should not be retried.
        code:
          title: Payment status code
          allOf:
            - $ref: '#/components/schemas/TransactionDeclineReasonV2Enum'
          description: >-
            If the error is of type `ISSUER_DECLINED`, this will be returned.
        message:
          title: Processor message
          type: string
          description: >-
            In case of an error on the processor's part, we will return the message
            returned by the processor. This is usually a human readable error.
        paymentMethodResultCode:
          title: Payment Method Result Code
          type: string
          description: |
            The result code returned by the payment method or card network. This code is unified across all supported processors.

            _e.g. Code `46` refers to the message "Closed account" for Visa across all supported processors._
        paymentMethodResultMessage:
          title: Payment Method Result Message
          type: string
          description: |
            Human-readable version of the Payment Method Result Code. This message is unified across all supported processors.

            _e.g. Code `46` refers to the message "Closed account" for Visa across all supported processors._
        paymentMethodAdviceCode:
          title: Payment Method Advice Code
          type: string
          description: |
            The advice code returned by the payment method or card network. This code is unified across all supported processors.

            _For payments made with Mastercard, this represents the Merchant Advice Code (MAC)._

            _e.g. Code `24` refers to the message "Retry after 1 hour" for Mastercard across all supported processors._
        paymentMethodAdviceMessage:
          title: Payment Method Advice Message
          type: string
          description: |
            Human-readable version of the Payment Method Advice Code. This message is unified across all supported processors.

            _For payments made with Mastercard, this represents the message of the Merchant Advice Code (MAC)._

            _e.g. Code `24` refers to the message "Retry after 1 hour" for Mastercard across all supported processors._
        advisedAction:
          title: Advised Action
          $ref: '#/components/schemas/AdvisedActionEnum'

