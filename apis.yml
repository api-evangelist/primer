description: >
  Primer is a payment orchestration platform that enables merchants to build
  flexible payment flows across multiple processors through a single REST API
  integration. The platform provides intelligent routing, automatic fallback
  logic, fraud detection integrations, and a no-code Workflows builder for
  managing payment rules without engineering effort. Primer supports 60+ payment
  methods including cards, digital wallets, and regional alternatives such as
  iDEAL, Klarna, and Alipay. The platform delivers unified observability,
  reconciliation, and analytics across all connected payment providers, and
  processes billions of dollars monthly with 99.99% uptime.
