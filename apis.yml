apis:
  - name: Primer Payments API
    description: >
      REST API for creating and managing payments, client sessions, and saved
      payment methods. Supports the full payment lifecycle including
      authorization, capture, refund, cancellation, and dispute management.
      Versioned via X-Api-Version header with current GA version 2.4.
